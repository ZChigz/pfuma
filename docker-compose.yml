services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: school_ms
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: node:20
    working_dir: /app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/school_ms
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: replace-with-openssl-rand-base64-32
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      - postgres

volumes:
  postgres_data:
